services:
  postgres:
    build: .
    container_name: data_warehouse_cdmx
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_warehouse
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_warehouse"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    build: ./dashboard
    container_name: data_warehouse_cdmx_dashboard
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: data_warehouse
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
